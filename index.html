<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Голосование</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    overflow: hidden;
}

#voteScreen,
#resultScreen{
    width: 100%;
}

h2{
    font-size: 42px;
    margin-bottom: 20px;
}

button{
    padding: 20px 40px;
    margin: 10px;
    font-size: 30px;
    cursor: pointer;
}

canvas{
    display: block;
    margin: 0 auto;
    max-width: 300px;
    max-height: 300px;
}

#stats{
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 10px;
}

</style>
</head>

<body>

<div id="voteScreen">
    <h2>Выберите вариант</h2>

    <button onclick="vote(1)">Вариант 1</button>
    <button onclick="vote(2)">Вариант 2</button>
</div>

<div id="resultScreen" style="display:none">
    <h2>Результаты</h2>

    <div id="stats"></div>

    <canvas id="chart" width="300" height="300"></canvas>

    <br>

    <button onclick="nextVote()">Следующий голос</button>
    <button onclick="resetVotes()">Сбросить результаты</button>
</div>

<script>

let votes1 = parseInt(localStorage.getItem("votes1") || "0");
let votes2 = parseInt(localStorage.getItem("votes2") || "0");

let chart;

function saveVotes(){
    localStorage.setItem("votes1", votes1);
    localStorage.setItem("votes2", votes2);
}

function vote(option){

    if(option === 1){
        votes1++;
    } else {
        votes2++;
    }

    saveVotes();

    document.getElementById("voteScreen").style.display = "none";
    document.getElementById("resultScreen").style.display = "block";

    drawChart();
}

function drawChart(){

    const total = votes1 + votes2;

    const percent1 = total ? ((votes1 / total) * 100).toFixed(1) : 0;
    const percent2 = total ? ((votes2 / total) * 100).toFixed(1) : 0;

    document.getElementById("stats").innerHTML =
        `Вариант 1: ${percent1}% (${votes1} голосов)<br>
         Вариант 2: ${percent2}% (${votes2} голосов)`;

    if(chart){
        chart.destroy();
    }

    chart = new Chart(
        document.getElementById('chart'),
        {
            type: 'pie',
            data: {
                labels: ['Вариант 1', 'Вариант 2'],
                datasets: [{
                    data: [votes1, votes2]
                }]
            },
            options: {
                responsive: false,
                plugins: {
                    legend: {
                        labels: {
                            font: {
                                size: 22
                            }
                        }
                    }
                }
            }
        }
    );
}

function nextVote(){
    document.getElementById("voteScreen").style.display = "block";
    document.getElementById("resultScreen").style.display = "none";
}

function resetVotes(){

    votes1 = 0;
    votes2 = 0;

    localStorage.removeItem("votes1");
    localStorage.removeItem("votes2");

    drawChart();
}

</script>

</body>
</html>
